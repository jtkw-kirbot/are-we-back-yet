<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>are we back yet?</title>
    <link rel="stylesheet" href="styles.css?v=20260430-positive-signal-copy">
  </head>
  <body>
    <main class="shell">
      <section class="tracker" aria-labelledby="title">
        <header class="tracker-header">
          <div>
            <h1 id="title">are we back yet?</h1>
            <p id="range-label">Year to date</p>
          </div>
          <div class="legend" aria-label="Positive signal colors">
            <span><i class="swatch openai"></i>OpenAI</span>
            <span><i class="swatch anthropic"></i>Anthropic</span>
            <span><i class="swatch google_gemini"></i>Gemini</span>
            <span><i class="swatch microsoft_copilot"></i>Copilot</span>
            <span><i class="swatch missing"></i>No positive/data</span>
          </div>
        </header>
        <div id="grid" class="grid" aria-label="Daily front-page story and comment sentiment rankings"></div>
      </section>
    </main>
    <footer class="site-footer">
      <a href="https://github.com/jtkw-kirbot/are-we-back-yet" target="_blank" rel="noreferrer">github</a>
    </footer>
    <div id="popover" class="popover" hidden></div>
    <script src="app.js?v=20260430-positive-signal-copy"></script>
  </body>
</html>
