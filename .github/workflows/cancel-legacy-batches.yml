name: Cancel legacy OpenAI batches

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Dry-run lists matching batches; execute cancels them.
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run
          - execute

jobs:
  cancel:
    runs-on: ubuntu-latest
    steps:
      - name: Cancel matching legacy batches
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MODE: ${{ inputs.mode }}
        run: |
          node --input-type=module <<'NODE'
          const active = new Set(["validating", "in_progress", "finalizing", "cancelling"]);
          const key = process.env.OPENAI_API_KEY;
          const mode = process.env.MODE;

          if (!key) throw new Error("OPENAI_API_KEY is not set");
          if (mode !== "dry-run" && mode !== "execute") throw new Error(`Unsupported mode: ${mode}`);

          function belongsToThisApp(batch) {
            const metadata = batch.metadata || {};
            const kind = metadata.kind;
            const prompt = metadata.prompt || "";
            const date = metadata.date || "";
            const model = metadata.model || "";

            return (
              (kind === "entity" || kind === "sentiment") &&
              (prompt.startsWith("entity-") || prompt.startsWith("sentiment-")) &&
              /^\d{4}-\d{2}-\d{2}$/.test(date) &&
              model.includes("gpt-5.4-mini")
            );
          }

          async function openai(path, init = {}) {
            const res = await fetch(`https://api.openai.com/v1${path}`, {
              ...init,
              headers: {
                Authorization: `Bearer ${key}`,
                "Content-Type": "application/json",
                ...(init.headers || {}),
              },
            });
            if (!res.ok) throw new Error(`${res.status} ${await res.text()}`);
            return res.json();
          }

          const matched = [];
          let after;
          let seen = 0;

          while (true) {
            const qs = new URLSearchParams({ limit: "100" });
            if (after) qs.set("after", after);
            const page = await openai(`/batches?${qs}`);
            const data = page.data || [];
            seen += data.length;

            for (const batch of data) {
              if (active.has(batch.status) && belongsToThisApp(batch)) {
                matched.push(batch);
              }
            }

            if (!page.has_more || data.length === 0) break;
            after = data[data.length - 1].id;
          }

          console.log(`mode=${mode}`);
          console.log(`seen=${seen}`);
          console.log(`matched=${matched.length}`);

          for (const batch of matched) {
            const metadata = batch.metadata || {};
            console.log(`${mode === "execute" ? "cancelling" : "would_cancel"} id=${batch.id} status=${batch.status} date=${metadata.date} kind=${metadata.kind} model=${metadata.model} prompt=${metadata.prompt}`);
            if (mode === "execute" && batch.status !== "cancelling") {
              await openai(`/batches/${batch.id}/cancel`, { method: "POST" });
            }
          }
          NODE
