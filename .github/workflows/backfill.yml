name: Backfill HN sentiment range

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Start date, YYYY-MM-DD"
        required: true
      end_date:
        description: "End date, YYYY-MM-DD"
        required: true
      force:
        description: "Overwrite existing raw snapshots"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run backfill:hn -- --start "${{ inputs.start_date }}" --end "${{ inputs.end_date }}" ${{ inputs.force && '--force' || '' }}
      - env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npm run batch:entity
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git diff --cached --quiet || git commit -m "Backfill HN sentiment ${{ inputs.start_date }} to ${{ inputs.end_date }}"
          git push
