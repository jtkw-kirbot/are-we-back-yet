name: Daily HN sentiment sync

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Re-run dates even if new-method output already exists"
        type: boolean
        default: false
  schedule:
    - cron: "0 4 * * *"
    - cron: "0 5 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-hn-sentiment-sync
  cancel-in-progress: false

jobs:
  sync:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npm run sync:daily -- ${{ inputs.force && '--force' || '' }}
      - run: npm run build:site
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git diff --cached --quiet || git commit -m "Sync HN sentiment data"
          git pull --rebase origin main
          git push origin main
      - run: npm run build:site
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
