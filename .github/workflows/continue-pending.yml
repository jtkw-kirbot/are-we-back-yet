name: Continue pending processing

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: sentiment-processing
  cancel-in-progress: false

jobs:
  continue:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RESPONSES_MAX_ROWS_PER_RUN: "3000"
          RESPONSES_CONCURRENCY: "8"
        run: npm run process:pending
      - run: npm run build:site
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git diff --cached --quiet || git commit -m "Continue pending sentiment processing"
          git pull --rebase origin main
          git push
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
