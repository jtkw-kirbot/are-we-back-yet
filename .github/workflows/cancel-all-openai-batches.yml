name: Cancel all OpenAI batches

on:
  workflow_dispatch:

jobs:
  cancel:
    runs-on: ubuntu-latest
    steps:
      - name: Cancel all active batches
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          node --input-type=module <<'NODE'
          const cancellable = new Set(["validating", "in_progress", "finalizing"]);
          const key = process.env.OPENAI_API_KEY;
          if (!key) throw new Error("OPENAI_API_KEY is not set");

          async function openai(path, init = {}) {
            const res = await fetch(`https://api.openai.com/v1${path}`, {
              ...init,
              headers: {
                Authorization: `Bearer ${key}`,
                "Content-Type": "application/json",
                ...(init.headers || {}),
              },
            });
            if (!res.ok) throw new Error(`${res.status} ${await res.text()}`);
            return res.json();
          }

          const batches = [];
          let after;
          let seen = 0;

          while (true) {
            const qs = new URLSearchParams({ limit: "100" });
            if (after) qs.set("after", after);
            const page = await openai(`/batches?${qs}`);
            const data = page.data || [];
            seen += data.length;

            for (const batch of data) {
              if (cancellable.has(batch.status)) batches.push(batch);
            }

            if (!page.has_more || data.length === 0) break;
            after = data[data.length - 1].id;
          }

          console.log(`seen=${seen}`);
          console.log(`cancellable=${batches.length}`);

          for (const batch of batches) {
            const metadata = batch.metadata || {};
            console.log(`cancelling id=${batch.id} status=${batch.status} date=${metadata.date || ""} kind=${metadata.kind || ""} model=${metadata.model || ""}`);
            await openai(`/batches/${batch.id}/cancel`, { method: "POST" });
          }
          NODE
