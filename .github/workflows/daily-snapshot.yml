name: Daily HN snapshot

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Bypass 9pm Los Angeles time gate"
        type: boolean
        default: false
  schedule:
    - cron: "0 4 * * *"
    - cron: "0 5 * * *"

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - id: gate
        run: npm run check:timegate -- ${{ inputs.force && '--force' || '' }}
      - if: steps.gate.outputs.proceed == 'true'
        run: npm run fetch:hn -- --date "${{ steps.gate.outputs.date }}"
      - if: steps.gate.outputs.proceed == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npm run batch:entity -- --date "${{ steps.gate.outputs.date }}"
      - if: steps.gate.outputs.proceed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git diff --cached --quiet || git commit -m "Capture HN sentiment snapshot ${{ steps.gate.outputs.date }}"
          git push
